services:
  postgres:
    image: postgres:17-alpine
    container_name: astoria-runners-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: astoria_runners
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - /Volumes/Delorean/docker_apps/astoria_runners/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: astoria-runners-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - /Volumes/Delorean/docker_apps/astoria_runners/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
